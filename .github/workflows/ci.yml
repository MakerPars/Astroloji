name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Secret scan
        run: node scripts/scan-secrets.mjs

  backend:
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  android:
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: Astroloji
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew
      - name: Prepare Firebase placeholder config
        run: cp app/google-services.example.json app/google-services.json
      - name: Detekt
        run: ./gradlew :app:detekt
      - name: ktlint
        run: ./gradlew :app:ktlintCheck
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest
      - name: Assemble debug
        run: ./gradlew :app:assembleDebug
